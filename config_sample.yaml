stt:
  # type: whisper.cpp  -> uses "{api_url}/inference" (whisper-server --convert)
  # type: openai       -> uses "{api_url}/audio/transcriptions" (OpenAI-compatible, e.g. Bifrost)
  type: whisper.cpp
  api_url: "http://localhost:8080"
  api_key:
  model: whisper-1
  default_language: "auto"

llm:
  api_url: "http://localhost:8081/v1"
  api_key: sk-1234
  model: smart-model

audio:
  # Separate clean vocals from background music/SFX (demucs) before STT.
  # Improves transcription when the source has music or sound effects.
  # Requires the optional dependency: uv sync --extra separate
  isolate_vocals: false
  separator_model: htdemucs # demucs model (e.g. htdemucs, htdemucs_ft, mdx_extra)
  separator_device: # cpu | cuda | mps | (empty = auto-detect)
  separator_output_mp3: true # keep stems as mp3 (smaller) instead of wav
