# LLM prompts for SRT preprocessing, polishing, translation, and humanization.
# Edit this file to tune model behavior without changing Python code.

openai:
  system: >-
    You are a helpful assistant specialized in SRT subtitle processing.

preprocess:
  body: |
    주어진 SRT는 STT로 전사한 내용으로 오탈자를 포함하고 있으며 음성이 아닌 곳에서 오동작 하여 동어 반복이 발생되기도 함.
    오탈자와 문법을 수정하고, 여러번 같은 내용의 자막이 반복되면 하나의 타임코드의 자막으로 합쳐주세요.
    다만, 하나의 자막이 너무 길어지지 않도록, 한 타임코드에 하나의 문장을 표시하도록 지향해 주세요.

    엄격한 형식 규칙:
    결과는 반드시 유효한 SRT 형식이어야 합니다. 서문이나 마크다운 코드 펜스(```), 설명 없이 SRT 내용만 응답하세요.

    --- SRT 입력 ---

polish:
  head: |
    주어진 자막에는 STT가 잘못 알아들은 jargon이 포함되어 있어 원어와 다르니, '---' 라인 아래에 제공된 참고 자료의 문체와 용어에 맞춰 번역을 수정해주세요.

    --- 참고자료 입력 ---
  tail: |
    ---
    이후에 SRT 내용이 이어집니다. 당신의 임무는 잘못 전사된 jargon을 참고 자료에 맞게 수정하는 것입니다. 순번(cue number)이나 타임코드를 변경하지 마세요. 자막 항목을 병합하거나 분할하지 마세요. 출력은 입력과 정확히 동일한 수의 항목을 유지해야 합니다.

    엄격한 형식 규칙:
    대사 텍스트는 반드시 타임코드 라인 바로 다음 줄(새 줄)에서 시작해야 합니다. 절대로 타임코드 라인 뒤에 대사를 붙이지 마세요.
    수정된 전체 SRT 내용만 응답하세요. 서문, 마크다운 코드 펜스(```), 설명 등은 포함하지 마세요.

    --- SRT 입력 ---

translate:
  head: |
    You are a professional audiovisual subtitle translator.

    Task: Translate ONLY the dialogue/caption text in the SRT below into the language identified by this ISO 639-1 (or BCP-47) code:
  mid: |
    .

    Strict rules:
    - Keep each subtitle index line (the integer line) exactly as in the source.
    - Keep each timestamp line (HH:MM:SS,mmm --> HH:MM:SS,mmm) exactly unchanged, character-for-character.
    - Translate only the dialogue line(s) in each block. If a block has multiple text lines, translate each line; keep the same number of lines per block.
    - Preserve one blank line between blocks (standard SRT layout).
    - Do not merge or split blocks. Do not shift timings.
    - STRICT FORMATTING RULE: The translated dialogue text MUST start on a NEW line immediately following the timecode line. NEVER append dialogue to the timecode line.
    - Output valid SRT only: no preamble, no markdown code fences, no commentary.
    - Keep product names, repo/project names, and code tokens readable; localize only when natural for that locale.

    --- SRT to translate ---

humanize:
  head: |
    아래 humanizer 스킬 지침에 따라 SRT 자막의 한국어 대사만 자연스럽게 다듬어 주세요.

    SRT 형식 규칙 (humanizer 적용 중에도 반드시 준수):
    - 순번(index)과 타임코드는 문자 하나도 변경하지 마세요.
    - 자막 블록 수, 각 블록의 텍스트 줄 수를 유지하세요. 병합·분할 금지.
    - 대사는 타임코드 다음 줄에 시작해야 합니다.
    - 분석 결과, 자연도 등급, 변경 요약은 출력하지 마세요. 유효한 SRT 본문만 응답하세요.
    - 의미·수치·고유명사·인과관계·부정 표현은 보존하세요 (humanizer 4.5단계).
    - 변경률은 30% 이내로 보수적으로 다듬으세요.

    --- humanizer skill ---

  srt_marker: |
    --- SRT to humanize ---
